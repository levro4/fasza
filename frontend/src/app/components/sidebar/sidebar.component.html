<aside class="sidebar">
  <div class="logo">
    <!-- Fake Twitter Logo placeholder -->
    <svg viewBox="0 0 24 24" aria-hidden="true" width="30" height="30" fill="var(--primary-color)">
      <g>
        <path
          d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"></path>
      </g>
    </svg>
  </div>

  <nav class="nav-links">
    <a routerLink="/home" routerLinkActive="active" class="nav-item">
      <div class="nav-icon-wrapper">
        <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <g>
            <path
              d="M12 1.696L.622 8.807l1.06 1.696L3 9.679V19.5C3 20.881 4.119 22 5.5 22h13c1.381 0 2.5-1.119 2.5-2.5V9.679l1.318.824 1.06-1.696L12 1.696zM19 19.5c0 .276-.224.5-.5.5h-13c-.276 0-.5-.224-.5-.5v-11.1l7-4.375 7 4.375v11.1z"></path>
            <path d="M9 14h6v6H9z"></path>
          </g>
        </svg>
      </div>
      <span class="nav-text">Home</span>
    </a>
    <a routerLink="/explore" routerLinkActive="active" class="nav-item">
      <div class="nav-icon-wrapper">
        <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <g>
            <path
              d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"></path>
          </g>
        </svg>
      </div>

        <span class="nav-text">Explore</span>
    </a>
    @if (isLoggedIn()) {
      <a routerLink="/notifications" routerLinkActive="active" class="nav-item">
        <div class="nav-icon-wrapper">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <g>
              <path
                d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zM8 16v-5c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v5H8z"></path>
            </g>
          </svg>
          @if (unreadCount > 0) {
            <span class="notif-badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
          }
        </div>
        <span class="nav-text">Notifications</span>
      </a>
      <a routerLink="/profile" routerLinkActive="active" class="nav-item">
        <div class="nav-icon-wrapper">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <g>
              <path
                d="M12 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-9 17.5c0-3.59 2.91-6.5 6.5-6.5h5c3.59 0 6.5 2.91 6.5 6.5v.5h-2v-.5c0-2.48-2.02-4.5-4.5-4.5h-5c-2.48 0-4.5 2.02-4.5 4.5v.5H3v-.5z"></path>
            </g>
          </svg>
        </div>
        <span class="nav-text">Profile</span>
      </a>
      @if (isAdmin()) {
        <a routerLink="/admin/suspended-users" routerLinkActive="active" class="nav-item">
          <div class="nav-icon-wrapper">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <g>
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm6.31-3.1L7.1 5.69C8.45 4.63 10.15 4 12 4c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9z"></path>
              </g>
            </svg>
          </div>
          <span class="nav-text">Suspended</span>
        </a>
      }
    }
  </nav>

  @if (isLoggedIn()) {
    <button class="btn-primary tweet-btn" (click)="openPostModal()">Post</button>
  }

  <div class="user-menu">
    @if (!isLoggedIn()) {
      <a routerLink="/auth" class="btn-outline auth-button">Login / Sign up</a>
    } @else {
      <a (click)="logout()" class="btn-outline auth-button">Log out</a>
    }
  </div>
</aside>

<!-- Post Modal -->
@if (isPostModalOpen) {
  <div class="modal-overlay" (click)="closePostModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <button class="modal-close-btn" (click)="closePostModal()">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="20" height="20" fill="currentColor">
            <g>
              <path
                d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path>
            </g>
          </svg>
        </button>
      </div>
      <div class="modal-content">
        <div class="post-input-container">
        <textarea
          class="post-textarea"
          placeholder="What is happening?!"
          [value]="postContent"
          (input)="onPostContentChange($event)">
        </textarea>
        </div>
        <div class="post-actions">
          <button
            class="btn-primary"
            [disabled]="!postContent.trim() || isSubmitting"
            (click)="submitPost()">
            Post
          </button>
        </div>
      </div>
    </div>
  </div>
}
