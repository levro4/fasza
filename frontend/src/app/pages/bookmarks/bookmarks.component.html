<header class="page-header">
  <div class="header-text">
    <h2>{{ pageTitle }}</h2>
    <span class="post-count">{{ bookmarkedPosts.length }} bookmarks</span>
  </div>
</header>

<div class="bookmarks-container">
  @if (bookmarkedPosts.length === 0) {
    <div class="placeholder-content">
      <p>Nem mentettél még el egyetlen bejegyzést sem.</p>
    </div>
  }

  @if (bookmarkedPosts.length > 0) {
    <div class="posts-feed">
      @for (item of bookmarkedPosts; track item.post.id) {
        <app-post
          [post]="item.post"
          [user]="item.user">
        </app-post>
      }
    </div>
  }
</div>
