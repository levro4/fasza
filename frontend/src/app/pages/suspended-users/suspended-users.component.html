<header class="page-header">
  <div class="header-content">
    <div class="back-button" (click)="goBack()">
      <svg viewBox="0 0 24 24" aria-hidden="true" class="back-icon"><g><path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path></g></svg>
    </div>
    <div class="header-text">
      <h2>Suspended Users</h2>
      <span class="subtitle">{{ users.length }} suspended</span>
    </div>
  </div>
</header>

@if (loading) {
  <div class="placeholder-content">
    <p>Loading...</p>
  </div>
} @else if (users.length === 0) {
  <div class="empty-state">
    <svg viewBox="0 0 24 24" aria-hidden="true" width="48" height="48" fill="var(--secondary-text-color)">
      <g><path d="M12 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-9 17.5c0-3.59 2.91-6.5 6.5-6.5h5c3.59 0 6.5 2.91 6.5 6.5v.5h-2v-.5c0-2.48-2.02-4.5-4.5-4.5h-5c-2.48 0-4.5 2.02-4.5 4.5v.5H3v-.5z"></path></g>
    </svg>
    <h2>No suspended users</h2>
    <p>There are currently no suspended accounts.</p>
  </div>
} @else {
  <div class="user-list">
    @for (user of users; track user.id) {
      <div class="user-row" (click)="goToProfile(user.id!)">
        <img [src]="user.profileImage || defaultProfilePictureUrl" alt="avatar" class="user-avatar">
        <div class="user-info">
          <span class="display-name">{{ user.displayName || user.username }}</span>
          <span class="username">&#64;{{ user.username }}</span>
        </div>
        <button class="btn-unsuspend" (click)="unsuspend(user, $event)">Unsuspend</button>
      </div>
    }
  </div>
}
