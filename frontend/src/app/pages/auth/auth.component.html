<div class="auth-page-container">
  <div class="auth-box">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" aria-hidden="true" width="40" height="40" fill="var(--primary-color)">
        <g><path d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"></path></g>
      </svg>
    </div>

    <h1 class="auth-heading">{{ isLoginMode ? 'Join FakeTwitter today' : 'Create your account' }}</h1>

    <!-- Login Form -->
    @if (isLoginMode) {
      <form class="auth-form-full" (ngSubmit)="login()">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" name="username" [(ngModel)]="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" name="password" [(ngModel)]="password" placeholder="Enter password" required>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn-primary" style="width: 100%; margin-bottom: 15px;">Log in</button>
          <div class="divider">
            <span>or</span>
          </div>
          <button type="button" class="btn-outline" style="width: 100%;" (click)="toggleMode()">Create account</button>
        </div>
      </form>
    } @else {
      <!-- Signup Form -->
      <form class="auth-form-full" (ngSubmit)="register()">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" name="username" [(ngModel)]="username" placeholder="Choose a username" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" name="email" [(ngModel)]="email" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" name="password" [(ngModel)]="password" placeholder="Create a password" required>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn-primary" style="width: 100%; margin-bottom: 15px;">Sign up</button>
          <div class="divider">
            <span>or</span>
          </div>
          <button type="button" class="btn-outline" style="width: 100%;" (click)="toggleMode()">Log in instead</button>
        </div>
      </form>
    }
  </div>
</div>
