<div class="layout-container">
  <!-- Bal oldali sáv -->
  <app-sidebar *ngIf="!isAuthPage"></app-sidebar>

  <!-- Középső tartalom, itt cserélődnek az oldalak -->
  <main class="main-content" [class.full-width]="isAuthPage">
    <router-outlet></router-outlet>
  </main>

  <!-- Jobb oldali sáv (későbbi funkciókhoz) -->
  <aside class="right-sidebar placeholder-content" *ngIf="!isAuthPage" style="width: 350px;">
    <!-- Itt lehet a keresés, ajánlások, stb. -->
  </aside>
</div>
