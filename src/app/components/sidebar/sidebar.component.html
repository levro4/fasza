  <button class="btn-primary tweet-btn" (click)="openPostModal()">Post</button>

  <div class="user-menu">
     <a routerLink="/auth" class="btn-outline" style="width: 100%; text-align: center; display: block; text-decoration: none; padding: 12px;">Login / Sign up</a>
  </div>
</aside>

<!-- Post Modal -->
<div class="modal-overlay" *ngIf="isPostModalOpen" (click)="closePostModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <button class="modal-close-btn" (click)="closePostModal()">
        <svg viewBox="0 0 24 24" aria-hidden="true" width="20" height="20" fill="currentColor">
          <g><path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path></g>
        </svg>
      </button>
    </div>
    <div class="modal-content">
      <div class="post-input-container">
        <textarea
          class="post-textarea"
          placeholder="What is happening?!"
          [value]="postContent"
          (input)="onPostContentChange($event)">
        </textarea>
      </div>
      <div class="post-actions">
        <button
          class="btn-primary"
          [disabled]="!postContent.trim()"
          (click)="submitPost()">
          Post
        </button>
      </div>
    </div>
  </div>
</div>
