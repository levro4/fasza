<div class="post" (click)="onPostClick()" [class.clickable]="isClickable">
  <div class="post-left-col">
    <img [src]="user.profileImage" alt="User avatar" class="post-avatar">
    <div class="thread-line" *ngIf="isThreadLineVisible"></div>
  </div>

  <div class="post-content-area">
    <div class="post-header">
      <div class="post-user-info">
        <span class="post-display-name">{{ user.displayName }}</span>
        <span class="post-username">{{ user.username }}</span>
        <span class="post-timestamp">· {{ post.timestamp }}</span>
      </div>
      <div class="post-options" (click)="onActionClick($event)">
         <svg viewBox="0 0 24 24" aria-hidden="true" width="18.75" height="18.75" fill="currentColor"><g><path d="M3 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm9 2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path></g></svg>
      </div>
    </div>

    <div class="post-text" [innerHTML]="formattedContent"></div>

    <!-- Interakció gombok Ikonokkal és számokkal -->
    <div class="post-actions-row">
      <!-- Reply (Kommentek) - Kattintásra nyílik a Modal -->
      <div class="action-group reply-group" (click)="openReplyModal($event)">
        <div class="action-icon reply-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18"><g><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"></path></g></svg>
        </div>
        <span class="action-count" *ngIf="commentCount > 0">{{ commentCount }}</span>
      </div>

      <!-- Retweet -->
      <div class="action-group retweet-group" [class.reposted]="post.isReposted" (click)="toggleRepost($event)">
        <div class="action-icon retweet-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18"><g><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"></path></g></svg>
        </div>
        <span class="action-count" *ngIf="post.reposts && post.reposts > 0">{{ post.reposts }}</span>
      </div>

      <!-- Like -->
      <div class="action-group like-group" [class.liked]="post.isLiked" (click)="toggleLike($event)">
        <div class="action-icon like-icon">
          <!-- Üres szív -->
          <svg *ngIf="!post.isLiked" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18"><g><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"></path></g></svg>
          <!-- Teli szív -->
          <svg *ngIf="post.isLiked" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18"><g><path d="M20.884 13.19c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"></path></g></svg>
        </div>
        <span class="action-count" *ngIf="post.likes && post.likes > 0">{{ post.likes }}</span>
      </div>

      <!-- View -->
      <div class="action-group view-group" (click)="onActionClick($event)">
        <div class="action-icon view-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18"><g><path d="M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z"></path></g></svg>
        </div>
        <span class="action-count" *ngIf="post.views && post.views > 0">{{ post.views }}</span>
      </div>

      <!-- Bookmark -->
      <div class="action-group bookmark-group" [class.bookmarked]="post.isBookmarked" (click)="toggleBookmark($event)">
        <div class="action-icon bookmark-icon">
          <!-- Üres könyvjelző ikon -->
          <svg *ngIf="!post.isBookmarked" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18"><g><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z"></path></g></svg>
          <!-- Teli könyvjelző ikon -->
          <svg *ngIf="post.isBookmarked" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18"><g><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5z"></path></g></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Reply (Komment) Modál -->
<div class="modal-overlay" *ngIf="isReplyModalOpen" (click)="closeReplyModal()">
  <div class="modal-container" (click)="$event.stopPropagation()" style="margin-top: 5vh; align-self: flex-start;">
    <div class="modal-header">
      <button class="modal-close-btn" (click)="closeReplyModal()">
        <svg viewBox="0 0 24 24" aria-hidden="true" width="20" height="20" fill="currentColor">
          <g><path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path></g>
        </svg>
      </button>
    </div>

    <div class="modal-content">
      <!-- Az eredeti poszt "idézete" (halvány vonallal) -->
      <div style="display: flex; margin-bottom: 12px;">
         <div style="display: flex; flex-direction: column; align-items: center; margin-right: 12px;">
            <img [src]="user.profileImage" alt="User avatar" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
            <div style="width: 2px; flex: 1; background-color: var(--border-color); margin-top: 4px;"></div>
         </div>
         <div style="flex: 1; padding-bottom: 20px;">
            <div style="display: flex; gap: 4px; align-items: center; margin-bottom: 2px;">
               <span style="font-weight: bold;">{{ user.displayName }}</span>
               <span style="color: var(--secondary-text-color);">{{ user.username }}</span>
               <span style="color: var(--secondary-text-color);">· {{ post.timestamp }}</span>
            </div>
            <div style="font-size: 15px; color: var(--text-color);" [innerHTML]="formattedContent"></div>
            <div style="margin-top: 10px; font-size: 15px; color: var(--secondary-text-color);">
               Replying to <span style="color: var(--primary-color);">{{ user.username }}</span>
            </div>
         </div>
      </div>

      <!-- A válasz input része -->
      <div style="display: flex;">
         <div style="margin-right: 12px;">
            <!-- Dummy profilkép a bejelentkezett felhasználónak -->
            <img src="https://i.pravatar.cc/150?img=11" alt="My avatar" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
         </div>
         <div style="flex: 1; display: flex; flex-direction: column;">
            <textarea
               class="reply-textarea"
               placeholder="Post your reply"
               [(ngModel)]="replyContent"
               style="border: none; resize: none; font-size: 20px; font-family: inherit; outline: none; min-height: 100px; padding: 10px 0; background: transparent; color: var(--text-color);">
            </textarea>
            <div style="display: flex; justify-content: flex-end; padding-top: 12px; border-top: 1px solid var(--border-color);">
               <button
                 class="btn-primary"
                 [disabled]="!replyContent.trim()"
                 (click)="submitReply()">
                 Reply
               </button>
            </div>
         </div>
      </div>

    </div>
  </div>
</div>
