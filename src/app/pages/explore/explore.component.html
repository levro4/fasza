<!-- Trends szekció -->
<div class="trends-section">
  <h2 class="trends-header-title">Trends for you</h2>

  <div class="trend-item" *ngFor="let trend of trends">
    <div class="trend-content">
      <span class="trend-category">{{ trend.category }}</span>
      <span class="trend-title">{{ trend.title }}</span>
    </div>
    <div class="trend-options">
      <svg viewBox="0 0 24 24" aria-hidden="true" width="18.75" height="18.75"><g><path d="M3 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm9 2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path></g></svg>
    </div>
  </div>
</div>

<!-- Random Posztok Szekció -->
<div class="divider"></div>
<div class="random-posts-feed">
  <app-post
    *ngFor="let item of randomPosts"
    [post]="item.post"
    [user]="item.user">
  </app-post>
</div>
